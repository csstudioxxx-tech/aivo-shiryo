<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ai-voyage ｜ Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#16335c;--navy2:#0f2747;--gold:#b8860b;--gold-soft:#caa53d;
  --ink:#15181d;--ink2:#5c636e;--faint:#9aa1ad;
  --bg:#f4f4f2;--bg2:#eceae5;--card:#ffffff;--line:#e7e6e1;
  --zen:"Zen Kaku Gothic New",sans-serif;--noto:"Noto Sans JP",sans-serif;--mono:"Manrope",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--noto);color:var(--ink);
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(184,134,11,.06), transparent 60%),
    radial-gradient(900px 600px at -5% 110%, rgba(22,51,92,.06), transparent 55%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
.wrap{max-width:1080px;margin:0 auto;padding:64px 40px 80px}
.top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:54px}
.eyebrow{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);}
.logo{font-family:var(--zen);font-weight:900;font-size:46px;letter-spacing:-.01em;line-height:1.05;margin-top:14px;color:var(--navy)}
.logo .dot{color:var(--gold)}
.tagline{color:var(--ink2);font-size:15px;font-weight:500;margin-top:12px;letter-spacing:.01em}
.clock{text-align:right}
.clock .t{font-family:var(--mono);font-weight:800;font-size:30px;letter-spacing:.02em;color:var(--navy);font-variant-numeric:tabular-nums}
.clock .d{font-size:12.5px;color:var(--faint);font-weight:600;margin-top:4px}
.sectionlabel{font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin:0 0 16px 2px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:18px}
.card{
  grid-column:span 2;position:relative;background:var(--card);border:1px solid var(--line);
  border-radius:22px;padding:26px 24px 22px;text-decoration:none;color:inherit;overflow:hidden;
  box-shadow:0 1px 2px rgba(20,30,50,.04), 0 14px 30px -18px rgba(20,30,50,.14);
  transition:transform .4s cubic-bezier(.2,.7,.2,1), box-shadow .4s, border-color .4s;
  min-height:188px;display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-6px);box-shadow:0 1px 2px rgba(20,30,50,.05), 0 30px 50px -22px rgba(20,30,50,.28);border-color:#dcdbd4}
.card .glow{position:absolute;inset:auto -40% -60% auto;width:220px;height:220px;border-radius:50%;filter:blur(46px);opacity:.16;transition:opacity .4s}
.card:hover .glow{opacity:.28}
.ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 6px 16px -6px rgba(0,0,0,.4)}
.ic svg{width:23px;height:23px;stroke:#fff;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.card h3{font-family:var(--zen);font-weight:900;font-size:19px;margin-top:18px;letter-spacing:.01em}
.card p{color:var(--ink2);font-size:13px;font-weight:500;margin-top:6px;line-height:1.5}
.card .go{margin-top:auto;display:flex;align-items:center;gap:7px;font-family:var(--mono);font-weight:700;font-size:12.5px;letter-spacing:.06em;color:var(--navy);padding-top:16px}
.card .go .arr{transition:transform .35s cubic-bezier(.2,.7,.2,1)}
.card:hover .go .arr{transform:translateX(6px)}
.card.feature{grid-column:span 3;min-height:188px}
.foot{margin-top:40px;display:flex;align-items:center;justify-content:space-between;color:var(--faint);font-size:12px;font-weight:500}
.foot .mono{font-family:var(--mono);letter-spacing:.04em}
@media(max-width:820px){.wrap{padding:40px 22px 60px}.grid{grid-template-columns:repeat(2,1fr)}.card,.card.feature{grid-column:span 2}.logo{font-size:36px}.top{flex-direction:column;align-items:flex-start;gap:18px}.clock{text-align:left}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="eyebrow">Ai-voyage ・ 賃貸企画室</div>
      <div class="logo">Workspace<span class="dot">.</span></div>
      <div class="tagline">日々の業務ツールへ、ここから。</div>
    </div>
    <div class="clock"><div class="t" id="clock">--:--</div><div class="d" id="date">—</div></div>
  </div>

  <div class="sectionlabel">接客 ・ 顧客</div>
  <div class="grid" style="margin-bottom:34px">
    <a class="card feature" href="https://csstudioxxx-tech.github.io/aivo-shiryo/" style="--c:#16335c">
      <span class="glow" style="background:#16335c"></span>
      <span class="ic" style="background:linear-gradient(140deg,#244a7e,#16335c)">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18M8 18v2m8-2v2M7 21h10"/></svg></span>
      <h3>資料一覧</h3><p>接客スライド集。商談で使う5つのデッキを1か所に。</p>
      <span class="go">OPEN<span class="arr">→</span></span>
    </a>
    <a class="card feature" href="https://csstudioxxx-tech.github.io/aivo-shiryo/kokyaku.html" style="--c:#0071e3">
      <span class="glow" style="background:#0071e3"></span>
      <span class="ic" style="background:linear-gradient(140deg,#3a93ff,#0071e3)">
        <svg viewBox="0 0 24 24"><path d="M4 19c0-3 3-5 8-5s8 2 8 5"/><circle cx="12" cy="8" r="3.4"/></svg></span>
      <h3>顧客管理</h3><p>顧客マップ。沿線×賃料で希望と進捗をひと目で。</p>
      <span class="go">OPEN<span class="arr">→</span></span>
    </a>
  </div>

  <div class="sectionlabel">物出し ・ 分析</div>
  <div class="grid">
    <a class="card" href="https://csstudioxxx-tech.github.io/hanako-signal/" style="--c:#c2185b">
      <span class="glow" style="background:#c2185b"></span>
      <span class="ic" style="background:linear-gradient(140deg,#e3447e,#c2185b)">
        <svg viewBox="0 0 24 24"><path d="M4 18V9m5 9V5m5 13v-6m5 6V8"/></svg></span>
      <h3>花子シグナル</h3><p>入稿・反響・PV管理。</p>
      <span class="go">OPEN<span class="arr">→</span></span>
    </a>
    <a class="card" href="https://csstudioxxx-tech.github.io/Taro-options/" style="--c:#00838f">
      <span class="glow" style="background:#00838f"></span>
      <span class="ic" style="background:linear-gradient(140deg,#19a7b3,#00838f)">
        <svg viewBox="0 0 24 24"><path d="M12 3l2.2 5.6L20 9l-4.4 3.4L17 18l-5-3-5 3 1.4-5.6L4 9l5.8-.4z"/></svg></span>
      <h3>物出し太郎</h3><p>反響効果ダッシュボード。</p>
      <span class="go">OPEN<span class="arr">→</span></span>
    </a>
    <a class="card" href="https://csstudioxxx-tech.github.io/Taro-options/priority.html" style="--c:#c0392b">
      <span class="glow" style="background:#c0392b"></span>
      <span class="ic" style="background:linear-gradient(140deg,#e05545,#c0392b)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v3m0 12v3m9-9h-3M6 12H3"/><path d="M12 12l4-2-2 4z" fill="#fff" stroke="none"/></svg></span>
      <h3>二郎 Polaris</h3><p>物出しワークリスト。</p>
      <span class="go">OPEN<span class="arr">→</span></span>
    </a>
  </div>

  <div class="foot">
    <span>© Ai-voyage 賃貸企画室</span>
    <span class="mono">WORKSPACE</span>
  </div>
</div>
<script>
function tick(){
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent=p(d.getHours())+':'+p(d.getMinutes());
  const w=['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('date').textContent=`${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} (${w})`;
}
tick();setInterval(tick,10000);
</script>
</body>
</html>
